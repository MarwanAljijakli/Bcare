<!doctype html>
<html lang="ar" dir="rtl">
  <body
    style="
      font-family:
        'IBM Plex Sans Arabic',
        -apple-system,
        'Segoe UI',
        Tahoma,
        sans-serif;
      background: #f9fafb;
      color: #1e293b;
      margin: 0;
      padding: 32px 16px;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="
        max-width: 480px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
      "
    >
      <tr>
        <td style="padding: 32px; direction: rtl; text-align: right">
          <div style="display: inline-flex; align-items: center; gap: 8px; margin-bottom: 24px">
            <div
              style="
                width: 32px;
                height: 32px;
                border-radius: 8px;
                background: #2b6cb0;
                color: #a7f3d0;
                font-size: 18px;
                line-height: 32px;
                text-align: center;
                font-weight: 700;
              "
            >
              ♥
            </div>
            <strong style="font-size: 18px; color: #1e293b">بلوكير</strong>
          </div>
          <h1 style="font-size: 24px; line-height: 1.4; margin: 0 0 16px 0; color: #0f2e55">
            تمت دعوتك إلى بلوكير.
          </h1>
          <p style="font-size: 15px; line-height: 1.7; margin: 0 0 24px 0; color: #374151">
            دعاك أحد مقدّمي الرعاية لمتابعة طفل على بلوكير. اضغط الزر لقبول الدعوة وإنشاء حسابك.
          </p>
          <p style="margin: 0 0 32px 0">
            <a
              href="{{ .ConfirmationURL }}"
              style="
                display: inline-block;
                padding: 12px 24px;
                background: #2b6cb0;
                color: #ffffff;
                text-decoration: none;
                font-weight: 600;
                border-radius: 999px;
                font-size: 15px;
              "
            >
              قبول الدعوة
            </a>
          </p>
          <p style="font-size: 13px; line-height: 1.7; color: #6b7280; margin: 0">
            بلوكير مجاني. إن لم تكن تتوقّع هذه الدعوة، يمكنك تجاهل الرسالة.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
