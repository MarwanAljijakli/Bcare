name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.19.0'
  PNPM_VERSION: '10.17.0'

jobs:
  lint-typecheck-unit:
    name: Lint · Typecheck · Unit · A11y
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: i18n direction lint (RTL parity)
        run: pnpm lint:i18n

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test

  e2e:
    name: E2E (Playwright on Chromium / Firefox / WebKit)
    runs-on: ubuntu-latest
    needs: [lint-typecheck-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @bluecare/web exec playwright install --with-deps
      - run: pnpm --filter @bluecare/web build
      - run: pnpm test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 14

  lighthouse:
    name: Lighthouse CI (≥ 95 on /en and /ar)
    runs-on: ubuntu-latest
    needs: [lint-typecheck-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run Lighthouse CI
        run: pnpm --filter @bluecare/web exec lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: web/lighthouse-reports
          retention-days: 14
