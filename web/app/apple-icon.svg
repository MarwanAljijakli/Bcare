<!--
  Apple touch icon. Reuses the brand mark with iOS-friendly proportions.
  Note: iOS prefers PNG for home-screen icons; SVG is broadly supported in
  modern Safari but the PNG-rasterized variant is on the backlog as a
  separate Module 9 hardening pass (see docs/backlog.md).
-->
