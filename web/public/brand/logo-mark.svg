<?xml version="1.0" encoding="UTF-8"?>
<!--
  BlueCare brand mark.
  A speech-bubble silhouette with a calm heart-arc inside, set in trust-blue
  #2B6CB0. Optically balanced for both LTR and RTL alignment — the "tail" of
  the bubble points down-leading-edge so it can be flipped via CSS transform
  scaleX(-1) without visual asymmetry. See storybook story for verification.
  Aspect ratio 1:1 at 64px production size.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  role="img"
  aria-label="BlueCare"
  width="64"
  height="64"
>
  <title>BlueCare</title>
  <!-- Speech bubble with calm rounded shoulders. Tail tucked under-left. -->
  <path
    fill="#2B6CB0"
    d="M32 6c12.703 0 23 9.402 23 21 0 11.598-10.297 21-23 21a26.5 26.5 0 0 1-7.5-1.07L13.6 51.55a1.7 1.7 0 0 1-2.232-2.07l2.78-7.42C10.96 38.39 9 33.32 9 27 9 15.402 19.297 6 32 6Z"
  />
  <!-- Heart-arc — two soft lobes meeting in a low centerpoint. Mint accent
       inside the bubble, not on it, so the bubble keeps its silhouette. -->
  <path
    fill="#A7F3D0"
    d="M32 38.5c-1.05-.97-3.7-2.94-6-5.32-2.5-2.6-3.94-5-3.94-7.4 0-2.74 2.18-4.78 4.85-4.78 1.94 0 3.65 1.07 4.45 2.7.13.27.55.27.68 0 .8-1.63 2.51-2.7 4.45-2.7 2.67 0 4.85 2.04 4.85 4.78 0 2.4-1.44 4.8-3.94 7.4-2.3 2.38-4.95 4.35-6 5.32a.63.63 0 0 1-.84 0Z"
  />
</svg>
